spring:
  application:
    name: montador-de-rpg-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/db_rpg
    username: rpguser
    password: rpgpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          discord:
            client-id: ${DISCORD_CLIENT_ID}
            client-secret: ${DISCORD_CLIENT_SECRET}
            scope:
              - identify
              - email
            client-name: Discord
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          discord:
            authorization-uri: https://discord.com/api/oauth2/authorize
            token-uri: https://discord.com/api/oauth2/token
            user-info-uri: https://discord.com/api/users/@me
            user-name-attribute: id

app:
  jwt:
    secret: ${JWT_SECRET:SUA_CHAVE_SECRETA_SUPER_SEGURA_COM_PELO_MENOS_256_BITS_MUDAR_DEPOIS}
    expirationInMs: 86400000
  oauth2:
    authorizedRedirectUri: http://localhost:5173/oauth2/redirect
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
      - https://*.githubpreview.dev
      - https://*.app.github.dev